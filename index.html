<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit Habits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#0b0d10', // Dark Main
              surface: '#151922',    // Dark Card
              primary: '#c9a24d',    // Accent Gold
              'primary-soft': '#e1c878', 
              success: '#10b981',    // Vibrant Emerald Green
              'success-dark': '#047857',
              danger: '#ef4444',     // Red
              'danger-dark': '#991b1b',
              text: '#f3f4f6',       // Brighter Text
              muted: '#9ca3af',      // Muted Text
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            keyframes: {
              'flash-intense': {
                '0%, 100%': { opacity: '1', boxShadow: '0 0 5px rgba(201,162,77,0.5)', transform: 'scale(1)' },
                '50%': { opacity: '1', boxShadow: '0 0 25px rgba(201,162,77,1)', transform: 'scale(1.15)', borderColor: '#fff' },
              }
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'spin-slow': 'spin 12s linear infinite',
              'flash': 'flash-intense 2s ease-in-out infinite',
            },
            boxShadow: {
              'strong': '0 12px 30px rgba(0, 0, 0, 0.5)',
              'soft': '0 6px 18px rgba(0, 0, 0, 0.35)',
              'gold': '0 0 15px rgba(201, 162, 77, 0.3)',
              'neon-green': '0 0 10px rgba(16, 185, 129, 0.4)',
            }
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0b0d10;
        /* Dynamic background component handles the visuals now */
        color: #e5e7eb;
        overflow-x: hidden;
      }
      
      /* Optimize rendering */
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Custom Scrollbar - Sleek & Modern */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background-color: #0b0d10;
      }
      ::-webkit-scrollbar-thumb {
        background-color: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: rgba(201, 162, 77, 0.5);
      }
      
      /* Glass effect for active elements */
      .glass-panel {
        background: rgba(21, 25, 34, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
    </style>
